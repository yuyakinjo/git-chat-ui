<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Chat UI</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          background: #f6f0e8;
          color: #2b2118;
          font-family:
            Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
            sans-serif;
        "
        role="status"
        aria-live="polite"
      >
        <div
          style="
            border: 1px solid rgb(0 0 0 / 0.1);
            border-radius: 24px;
            background: rgb(255 255 255 / 0.72);
            padding: 28px 32px;
            box-shadow: 0 24px 70px rgb(60 39 14 / 0.14);
          "
        >
          <div
            style="
              margin-bottom: 8px;
              color: #8a6a45;
              font-size: 11px;
              font-weight: 700;
              letter-spacing: 0.12em;
              text-transform: uppercase;
            "
          >
            Launching
          </div>
          <div style="font-size: 20px; font-weight: 700">Git Chat UI を起動しています</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
